{% extends "layout.html" %}
{% block main %}

<div class="container-fluid px-4">
    <div class="row hub-row">
        <div class="col-12 col-lg-3 order-2 order-lg-1 scroll-col">
            <div class="glass-card h-100 glass-effect">
                <h4 class="text-white"><i class="bi bi-bar-chart-steps"></i> Controle</h4>
                <hr class="glass-hr">
                <div id="order-list-content" hx-get="{% url 'cashier:order-list' %}" hx-trigger="load">
                </div>
            </div>
        </div>


        <div class="col-12 col-lg-6 order-1 order-lg-2 scroll-col">
            <div class="glass-card h-100 glass-effect">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="text-white m-0">Novo Pedido</h3>
                    <div id="messages-container"></div>
                    <div id="order-total" class="h4 fw-bold" style="color:#85bb65;">$0.00</div>
                </div>
                <hr class="glass-hr">
                <div id="order-form-container">
                    {% include "partials/order_form.html" %}
                </div>
            </div>
        </div>


        <div class="col-12 col-lg-3 order-3 order-lg-3 scroll-col">
            <div class="glass-card glass-effect">
                <h4 class="text-white"><i class="bi bi-box-seam"></i> Estoque</h4>
                <hr class="glass-hr">
                <div id="stock-list-content" hx-get="{% url 'cashier:stock-list' %}" hx-trigger="load">
                </div>
            </div>
        </div>
    </div>
</div>



{% endblock main %}
