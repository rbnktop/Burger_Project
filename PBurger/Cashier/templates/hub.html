{% extends "layout.html" %}
{% block main %}
<div class="container-fluid">
    <div class="row hub-row g-3">
        

        <!-- ================= LEFT COLUMN: Sidebar ================= -->
        <div class="col-12 col-lg-3 d-flex flex-column gap-3" style="height: 84vh;">

                                        <!-- Orders -->
            <div class="glass-card glass-effect d-flex flex-column" style="flex: 2; overflow: hidden;">
                <h6 class="text-white m-2"><i class="bi bi-bar-chart-steps"></i> Pedidos</h6>
                <hr class="glass-hr">
                <div id="order-list-content" class="flex-grow-1 overflow-auto p-2" hx-get="{% url 'cashier:order-list' %}" hx-trigger="load">
                </div>
            </div>

                                        <!-- Stock -->
            <div class="glass-card glass-effect d-flex flex-column" style="flex: 1; overflow: hidden;">
                <h6 class="text-white m-0 p-2"><i class="bi bi-box-seam"></i> Estoque</h6>
                <hr class="glass-hr">
                <div id="stock-list-content" class="flex-grow-1 overflow-auto p-2" hx-get="{% url 'cashier:stock-list' %}" hx-trigger="load">
                </div>
            </div>

        </div>

        <!-- ================= RIGHT COLUMN  ================= -->
        <div class="col-12 col-lg-9">
            <form id="order-form" 
                  hx-post="{% url 'cashier:process-order' %}" 
                  hx-target="#order-form-container"
                  class="glass-card glass-effect d-flex flex-column" 
                  style="height: 84vh;">
                {% csrf_token %}
                <!-- top -->
                <div class="pos-dashboard-grid">
                    <!-- left side -->
                    <div id="customer-input-container" class="glass-card area-customer" >
                        <label class="text-white-50 small"><i class="bi bi-person-vcard-fill"></i></label>
    
                        {{ form.customer_name }}
                        <br>
                        {{ form.customer_name }}
                        <br>
                        {{ form.customer_name }}
                        <br>
                        {{ form.customer_name }}
                        <br>
                        {{ form.customer_name }}


                    </div>
                    <!-- end left -->
                    
                    <!-- right side -->
                    <div class="glass-card area-checkout d-flex flex-column align-items-end justify-content-center border-start border-secondary">
                        
                        <div class="d-flex align-items-end align-self-end">
                            <div id="order-total" class="h2 fw-bold mb-2 display-1" style="color:#85bb65;">
                                <i class="bi bi-currency-dollar"></i>
                            </div>
                        </div>
                        
                        <div id="messages" class="glass-card" hx-swap-oob="true">
                            <div class=" text-center mx-auto ms-auto"> STATUS... <i class="bi bi-info-circle"></i></div>
                        </div>

                        <div class="d-flex align-items-center align-self-center">
                            <button type="submit" class="btn btn-primary fw-bold">Confirmar</button>
                        </div>

                    </div>
                    <!-- end right -->
                </div>
                <!-- end top -->
                <!-- <hr class="glass-hr"> -->
                <!-- bottom -->
                <div class="flex-grow-1 overflow-auto pt-2 pe-2 " style="scrollbar-width: thin;">
                    <div id="order-form-container">
                        {% include "partials/order_form.html" %}
                    </div>
                </div>
                <!-- end bottom -->
            </form>
        </div>
    </div>
</div>
{% endblock main %}
