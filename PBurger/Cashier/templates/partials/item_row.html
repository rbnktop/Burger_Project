<div class="item-row p-2 mb-2 d-flex gap-2 align-items-center">
    <!-- The hidden ID field for the form -->
    {{ form.id }}

    <!-- Product Selection -->
    <div class="flex-grow-1">
        <label class="small text-muted d-block">Produto</label>
        <div hx-post="{% url 'cashier:calculate-total' %}" 
             hx-target="#order-total" 
             hx-trigger="change from:select"
             hx-include="#order-form">
            {{ form.product }}
        </div>
    </div>

    <div style="width: 60px;">
        <label class="small text-muted d-block">Quantia</label>
        <input type="number" 
               name="{{ form.quantity.html_name }}" 
               value="{{ form.quantity.value|default:1 }}"
               class="form-control"
               hx-post="{% url 'cashier:calculate-total' %}" 
               hx-target="#order-total" 
               hx-trigger="keyup delay:200ms, change"
               hx-include="#order-form">
    </div>

    <div class="pt-3">
        <button type="button" class="btn btn-outline-danger btn-sm border-0" 
                onclick="this.closest('.item-row').remove()">
            <i class="bi bi-trash"></i>
        </button>
    </div>
</div>
