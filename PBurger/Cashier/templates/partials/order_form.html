


{{ formset.management_form }}
<div class="d-flex flex-wrap justify-content-start gap-3"> 
    {% for item_form in formset %}
        <div class="product-card-wrapper" style="width: 160px;">
            <div class="glass-card text-center p-3 h-100 transition-all">
                <div class="d-none">{{ item_form.product }}</div>
                
                <div class="product-info mb-2">
                    <h6 class="text-white mb-1 small">{{ item_form.instance.product.name|default:"Produto" }}</h6>
                    <p class="text-white-50 small mb-0">${{ item_form.instance.product.price }}</p>
                </div>

                <div class="qty-container d-flex justify-content-center align-items-center gap-2 mt-2">
                    <button type="button" class="btn btn-sm btn-outline-success border-0 p-1" onclick="changeQty(this, 1)">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                    
                    <input type="number" name="{{ item_form.quantity.html_name }}" value="0" readonly
                           class="form-control form-control-sm bg-transparent text-white text-center border-0 qty-input p-0"
                           style="width: 35px;"
                           hx-post="{% url 'cashier:calculate-total' %}" 
                           hx-target="#order-total" 
                           hx-trigger="change"
                           hx-include="#order-form">
                    
                    <button type="button" class="btn btn-sm btn-outline-danger border-0 p-1" onclick="changeQty(this, -1)">
                        <i class="bi bi-dash"></i>
                    </button>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

<script>
function changeQty(btn, delta) {
    const container = btn.closest('.qty-container');
    const input = container.querySelector('.qty-input');
    const card = btn.closest('.glass-card');
    
    let newValue = (parseInt(input.value) || 0) + delta;
    if (newValue < 0) newValue = 0;
    
    input.value = newValue;
    card.style.backgroundColor = newValue > 0 ? 'rgba(0,0,0,0.6)' : '';
    
    input.dispatchEvent(new Event('change', { bubbles: true }));
}
</script>
