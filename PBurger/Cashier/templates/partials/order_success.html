


<!-- 1. Reset the Product Grid (Main Target) -->
<div id="order-form-container">
    {% include "partials/order_form.html" %}
</div>

<!-- 2. Reset the Customer Name (OOB) -->
<div id="customer-input-container" class="col-6" hx-swap-oob="true">
    <label class="text-white-50 small"><i class="bi bi-person-vcard-fill"></i></label>
    {{ form.customer_name }}
    <button type="submit" class="btn btn-primary fw-bold">Confirmar Venda</button>
</div>

<!-- 3. Show Success Message (OOB) -->
<div id="messages" class="col-2" hx-swap-oob="true">
    <div class="fade-out-message alert alert-success">{{ success_message }}<i class="bi bi-check-all"></i></div>
</div>

<!-- 4. Reset Total (OOB) -->
<div id="order-total" hx-swap-oob="true" class="h2 fw-bold" style="color:#85bb65;"><i class="bi bi-currency-dollar"></i></div>

<!-- 5. Append new order to the LEFT list (OOB) -->
<div hx-swap-oob="afterbegin:#order-list-content">
    <div class="glass-card mb-2 p-2 animate-new-item border border-success-subtle">
        <div class="d-flex justify-content-between small">
            <span>#{{ new_order.id }}</span>
            <span class="text-white-50">{{ new_order.create_at|date:"H:i" }}</span>
        </div>
        <div class="fw-bold">${{ new_order.total_price }}</div>
    </div>
</div>

<!-- 6. Refresh Stock List (OOB) -->
<div id="stock-list-content" hx-swap-oob="true">
    {% include "partials/stock_list.html" %}
</div>
