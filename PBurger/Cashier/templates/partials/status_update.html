


<div id="info-container" hx-swap-oob="true" 
class=" area-checkout d-flex flex-column justify-content-between p-2 "
style="height:100%;"
>

    <div class="d-flex w-100 justify-content-between align-items-center gap-3">
        
        <div class="glass-card w-50">

            {% if missing %}
                <div class="m-0 py-1">
                    <i class="bi bi-exclamation-triangle-fill"></i> Status
                    <ul class="mb-0 ps-3 mt-1 small">
                        {% for item in missing %}
                            <li>{{ item }}</li>
                        {% endfor %}
                    </ul>
                </div>
            {% else %}
                <i class="bi bi-info-circle"></i> Status
                <div class="small">Ok</div>
            {% endif %}
        </div>

        <div id="order-total" class="h2 fw-bold m-0 display-4" style="color:#85bb65;">
            <i class="bi bi-currency-dollar"></i><span id="order-value">{{ current_total }}</span>
        </div>
    </div>

    <div class="d-flex justify-content-center mt-2">
        <div class="btn-container w-100">
            <button type="submit" id='confirm' class="btn btn-primary fw-bold w-100 py-2" {% if missing %}disabled style="opacity: 0.3;background-color: transparent; border-color: transparent;"{% endif %}>
                Confirmar
            </button>
        </div>
    </div>
</div>
