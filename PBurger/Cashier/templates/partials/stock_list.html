{% for i in stock %}
<div class="d-flex mb-2 justify-content-between align-items-center btn-container ">
<div class="glass-effect glass-card text-center text-capitalize" style=" padding:4px; ">{{ i.name }}</div>
<div class="glass-effect glass-card text-center" style=" padding:4px; ">{{ i.quantity|floatformat:"-1" }}{{ i.unit_display }}</div>
</div>
<hr class="glass-hr">
{% endfor %}
