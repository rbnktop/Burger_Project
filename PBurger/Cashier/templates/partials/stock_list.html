{% for i in stock %}
<div class="d-flex mb-2 btn-container animate-new-item">
    <div class="glass-card text-center text-capitalize" style=" padding:4px ">{{ i.name }}</div>
    <div class="glass-card text-center" style="padding:2px;">{{ i.quantity|floatformat:"-1" }}{{ i.unit_display }}</div>
</div>
{% endfor %}
