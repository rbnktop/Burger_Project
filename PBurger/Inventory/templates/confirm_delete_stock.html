{% extends "layout.html"%}
{% block title %} Apagar {% endblock %}
{% block content %} 
<div class="d-flex justify-content-center align-items-center">
<div class="card glass-card">
<h1 class="text-center">Tem certeza que quer apagar?</h1>

<div class="container mt-4">
<div class="row g-1 justify-content-center">
<div class="col-4 col-md-1 col-lg-6 mb-9 d-flex"> 
            <div class="glass-card p-3 w-100">
                <h5 class="text-capitalize mb-2">{{ item.name }}</h5>
                <hr class="glass-hr">
                
                <div class="mb-3">
                    <small class="text-white-50 d-block">Quantidade:</small>
                    <span>{{ item.quantity }}{{ item.unit }}</span>
                </div>
                <div class="mb-3">
                    <small class="text-white-50 d-block">Valor:</small>
                    <span>R${{ item.price }} </span>
                </div>
                <hr class="glass-hr">
                <form method="POST" class="text-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger mr-4" >Sim</button>
                    <a href="{% url 'stock:inventario' %}" class="btn btn-success" >Não</a>
                </form>
            </div>
        </div>
    </div>
</div>


{% comment %} </div> {% endcomment %}

{% endblock %}
