{% extends "layout.html"%}
{% block title %} Adicionar {% endblock %}
{% block content %} 

<div class="container mt-5">
    
    <div class="d-flex align-items- mb-4">
        <h2 class="text-white">Receitas</h2>
    </div>
    <hr class="glass-hr">

    <div class="d-flex justify-content-between mb-4 pb-4 pt-3">
        <a href="{% url 'stock:receita_criar' %}" class="btn btn-primary px-3 py-1.5 " style="border-radius: 30px;">
            + Adicionar Item
        </a>
        <form class="d-flex" method="GET" action="{% url 'stock:receita' %}">
    <input 
        class="form-control me-2" 
        type="search" 
        name="q" 
        value="{{ request.GET.q }}" 
        placeholder="Search items..." 
        aria-label="Search"
        style="border-radius: 30px;"
    />
    <button class="btn btn-outline-success ml-2 mr-4 mt-1" type="submit">procurar</button>
    </form>
    </div>

    <div class="row g-4 justify-content-center">
    {% for item in recipe %}
        <div class="col-6 col-md-4 col-lg-3 mb-4 d-flex"> 
            <div class="glass-card p-3 w-100">
                <h5 class="text-capitalize mb-2">{{ item.name }}</h5>
                <hr class="glass-hr">
                
                <div class="mb-3">
                    <small class="text-white-50 d-block"></small>
                    <span>{{ item.ingredients.ingredient }}</span>
                </div>
                
                <hr class="glass-hr">
                <div class="mt-auto d-flex justify-content-end">
                    <a href="{% url 'stock:receita_editar' item.pk %}" class="btn btn-warning btn-sm mr-2">editar</a>
                    <a href="{% url 'stock:receita_apagar' item.pk %}" class="btn btn-danger btn-sm">remover</a>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

</div>

{% endblock %}
