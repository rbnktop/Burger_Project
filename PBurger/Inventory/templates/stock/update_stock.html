{% block title %} Item {% endblock title %} 

{% block content %}

<div class="card glass-card p-4">
        <h3 class="text-center mb-4"> Modificar Item </h3>
        
        <form method="POST">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <button type="submit" class="btn btn-primary btn-block mt-3">Confirmar</button>
        </form>
</div>

{% endblock %}
