{% load static %}
<!DOCTYPE html>

<html lang="en">
<head>  
    <meta charset="UTF-8">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@latest/dist/turbo.es2017-esm.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{% block title%} Null {% endblock %}</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        
        <a href="{% url 'greeting:home' %}" class="navbar-brand">Hamburgeria</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto align-items-center">
                <li class="nav-item px-2">
                    <a class="nav-link" href="{% url 'stock:inventario' %}">Stock</a>
                </li>
                <li class="nav-item px-2">
                    <a class="nav-link" href="{% url 'stock:receita_inventario' %}">Receitas</a>
                </li>
                <li class="nav-item px-2 d-none d-lg-block">
                    <span class="text-white">|</span>
                </li>
                {% if user.is_authenticated %}
                    <li class="nav-item px-2">
                        <span class="nav-link text-white ">Olá, {{ user.username }}!</span>
                    </li>
                    <li class="nav-item px-2">
                        <a class="nav-link text-danger" href="{% url 'greeting:logout' %}">Logout</a>
                    </li>
                {% else %}
                    <li class="nav-item px-2">
                        <a class="nav-link text-success" href="{% url 'greeting:login' %}">Login</a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<main class="container">
        {% block content %}{% endblock %}
</main>

        <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
        
</body>

<footer class="glass-footer py-2 fixed-bottom">
    <div class="container-fluid px-3">
        <div class="d-flex justify-content-end align-items-center">
            <span class="text-white-50 small">
                &copy; 2026 <strong class="brand-name">Victor Hugo</strong>
            </span>
        </div>
    </div>
</footer>
</html>
