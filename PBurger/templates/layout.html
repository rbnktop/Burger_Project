{% load static %}
<!DOCTYPE html>

<html lang="en">
<head>  
    <meta charset="UTF-8">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@hotwired/turbo@latest/dist/turbo.es2017-esm.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{% block title%} Null {% endblock %}</title>
</head>

<body>
<div class="container mt-1 p-4"> 
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container-fluid">
            
            <a href="{% url 'greeting:home' %}" class="navbar-brand"> Hamburgeria</a>

            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'stock:inventario' %}">Stock</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'stock:receita' %}">Receitas</a>
                    </li>
                    <hr class="glass-vr">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <span class="nav-link text-white">Olá, {{ user.username }}!</span>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-danger" href="{% url 'greeting:logout' %}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link text-success" href="{% url 'greeting:login' %}">Login</a>
                        </li>
                    {% endif %}
                        
                </ul>
            </div>
        </div>
    </nav>
</div>

        {% block content %}
        {% endblock %}

<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

</body>
</html>
