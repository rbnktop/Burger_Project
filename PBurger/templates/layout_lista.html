{% extends "layout.html" %}

{% block main %}
<div class="container mt-3" x-data="{ search: '' }"> 
    
    <div class="d-flex">
        <h2 class="text-white mx-auto">{% block sub_title %} Null {% endblock sub_title %}</h2>
    </div>

    <hr class="glass-hr" style=" margin: 2rem 0;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="{% block url_add_item %}#{% endblock url_add_item %}" class="btn btn-primary" style="border-radius: 30px;">
            + Adicionar Item
        </a>
        <div class="d-flex align-items-center gap-2">
            <input type="text" 
                   x-model="search" 
                   @keydown.enter.prevent 
                   placeholder="Procurar itens..." 
                   class="form-control glass-input glass-effect" 
                   style="max-width: 300px;">
            
            <i class="bi bi-search" style="position:relative; right:35px; color:white;"></i>
        </div>
    </div>

    {% block content %}
    {% endblock %}

</div>
{% endblock %}
