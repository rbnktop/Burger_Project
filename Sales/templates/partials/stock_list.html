{% for i in stock %}
<div class="d-flex mb-2 w-100 gap-2 animate-new-item">
    <div class="glass-card text-start text-capitalize flex-grow-1 p-2 px-3">
        {{ i.name }}
    </div>
    
    <div class="glass-card text-center p-2" style="width: 90px; min-width: 90px;">
        {{ i.quantity|floatformat:"-1" }}{{ i.unit_display }}
    </div>
</div>
{% empty %}
    <p class="text-white glass-effect glass-card p-3">Nenhum item no estoque.</p>
{% endfor %}
